<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotional Journey Map</title>
    <style>
        body {
            background-color: #F4F4F5;
            color: #27272A;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
        }

        .map-container {
            background: #FFFFFF;
            width: 100%;
            max-width: 1000px;
            padding: 50px 60px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            border: 1px solid #E4E4E7;
            box-sizing: border-box;
        }

        .header {
            margin-bottom: 50px;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 500;
            margin: 0;
            color: #18181B;
        }

        .header p {
            font-size: 15px;
            color: #71717A;
            margin-top: 8px;
        }

        .phases-container {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            text-align: center;
            border-bottom: 2px solid #E4E4E7;
            margin-bottom: 30px;
        }

        .phase-name {
            padding-bottom: 16px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
            color: #52525B;
        }

        .graph-area {
            position: relative;
            width: 100%;
        }

        svg {
            width: 100%;
            height: auto;
            display: block;
        }

        .neutral-line {
            stroke: #E4E4E7;
            stroke-width: 2;
            stroke-dasharray: 6 6;
        }

        .phase-divider {
            stroke: #E4E4E7;
            stroke-width: 2;
        }

        .journey-line {
            fill: none;
            stroke: #71717A;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .emotion-point {
            fill: #FFFFFF;
            stroke: #3F3F46;
            stroke-width: 2.5;
            transition: all 0.2s ease;
        }

        .emotion-point:hover {
            fill: #3F3F46;
            cursor: pointer;
        }

        .label {
            font-size: 13px;
            font-weight: 500;
            fill: #3F3F46;
            text-anchor: middle;
        }

        .y-axis-label {
            font-size: 11px;
            font-weight: 600;
            fill: #A1A1AA;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .annotation {
            font-size: 11px;
            font-weight: 400;
            fill: #A1A1AA;
            font-style: italic;
            text-anchor: middle;
        }
    </style>
</head>

<body>

    <div class="map-container">
        <div class="header">
            <h1>Emotional Journey: The Anxious Learner</h1>
            <p>Visualizing the changing emotional states throughout a typical learning experience.</p>
        </div>

        <div class="phases-container">
            <div class="phase-name">Before Learning</div>
            <div class="phase-name">During Learning</div>
            <div class="phase-name">After Learning</div>
        </div>

        <div class="graph-area">
            <svg viewBox="0 0 900 320" preserveAspectRatio="xMidYMid meet">
                <!-- Neutral Baseline -->
                <line x1="0" y1="160" x2="900" y2="160" class="neutral-line" />

                <!-- Phase Dividers (Even spacing: 0-300, 300-600, 600-900) -->
                <line x1="300" y1="0" x2="300" y2="320" class="phase-divider" />
                <line x1="600" y1="0" x2="600" y2="320" class="phase-divider" />

                <!-- Y-Axis Labels -->
                <text x="15" y="30" class="y-axis-label">Positive</text>
                <text x="15" y="300" class="y-axis-label">Negative</text>

                <!-- Journey Path -->
                <path class="journey-line" d="
                    M 60,160 
                    C 100,160 110,220 150,220
                    C 190,220 200,190 240,190
                    C 280,190 300,230 340,230
                    C 380,230 390,270 420,270
                    C 450,270 460,150 480,150
                    C 500,150 510,110 530,110
                    C 550,110 560,80  580,80
                    C 600,80  630,230 670,230
                    C 710,230 720,160 750,160
                    C 780,160 790,100 820,100
                    C 850,100 860,180 880,180
                " />

                <!-- Data Points & Labels (Phase 1) -->
                <circle cx="60" cy="160" r="5" class="emotion-point" />
                <text x="60" y="140" class="label">Anticipation</text>

                <circle cx="150" cy="220" r="5" class="emotion-point" />
                <text x="150" y="240" class="label">Anxiety</text>

                <circle cx="240" cy="190" r="5" class="emotion-point" />
                <text x="240" y="170" class="label">Uncertainty</text>

                <!-- Data Points & Labels (Phase 2) -->
                <circle cx="340" cy="230" r="5" class="emotion-point" />
                <text x="340" y="250" class="label">Confusion</text>

                <circle cx="420" cy="270" r="5" class="emotion-point" />
                <text x="420" y="295" class="label">Overwhelm</text>

                <!-- Clarifying the upward shift -->
                <text x="455" y="235" class="annotation">structure introduced</text>

                <circle cx="480" cy="150" r="5" class="emotion-point" />
                <text x="480" y="130" class="label">Relief</text>

                <text x="505" y="145" class="annotation">paced guidance</text>

                <circle cx="530" cy="110" r="5" class="emotion-point" />
                <text x="530" y="90" class="label">Focus</text>

                <circle cx="580" cy="80" r="5" class="emotion-point" />
                <text x="580" y="60" class="label">Engagement</text>

                <!-- Data Points & Labels (Phase 3) -->
                <circle cx="670" cy="230" r="5" class="emotion-point" />
                <text x="670" y="250" class="label">Exhaustion</text>

                <circle cx="750" cy="160" r="5" class="emotion-point" />
                <text x="750" y="140" class="label">Relief</text>

                <circle cx="820" cy="100" r="5" class="emotion-point" />
                <text x="820" y="80" class="label">Confidence</text>

                <circle cx="880" cy="180" r="5" class="emotion-point" />
                <text x="880" y="205" class="label">
                    <tspan x="880" dy="0">Lingering</tspan>
                    <tspan x="880" dy="1.4em">Uncertainty</tspan>
                </text>
            </svg>
        </div>
    </div>
</body>

</html>
